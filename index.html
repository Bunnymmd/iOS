<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Liquid Glass Single File</title>
  <style>
    :root {
      --safe-top: 62px;
      --dock-height: 88px;
      --dock-bottom: 44px;
      --indicator-width: 134px;
      --indicator-height: 5px;
      --indicator-bottom: 21px;
      --island-width: 230px;
      --island-height: 37px;
      --curve: cubic-bezier(0.22, 1, 0.36, 1);
      --curve-snappy: cubic-bezier(0.18, 0.89, 0.32, 1.18);
      --glass: rgba(255, 255, 255, 0.08);
      --glass-strong: rgba(255, 255, 255, 0.14);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: 0 18px 42px rgba(4, 12, 28, 0.18);
      --text-primary: rgba(255, 255, 255, 0.97);
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-tertiary: rgba(255, 255, 255, 0.48);
      --indicator-color: rgba(255, 255, 255, 0.86);
      --panel-dark: rgba(8, 12, 22, 0.36);
      --panel-soft: rgba(255, 255, 255, 0.08);
      --shadow-soft: 0 18px 40px rgba(4, 10, 24, 0.2);
      --artwork:
        radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.32), transparent 18%),
        radial-gradient(circle at 76% 78%, rgba(255, 255, 255, 0.12), transparent 26%),
        linear-gradient(138deg, #ffb17a 0%, #ff678f 44%, #6f6fff 100%);
      --icon-size: 60px;
      --icon-size-small: 54px;
      --icon-radius: 19px;
      color-scheme: dark;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --glass: rgba(255, 255, 255, 0.16);
        --glass-strong: rgba(255, 255, 255, 0.24);
        --glass-border: rgba(255, 255, 255, 0.22);
        --text-primary: rgba(255, 255, 255, 0.98);
        --text-secondary: rgba(255, 255, 255, 0.78);
        --indicator-color: rgba(255, 255, 255, 0.9);
      }
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at 14% 16%, rgba(116, 197, 255, 0.38), transparent 24%),
        radial-gradient(circle at 86% 12%, rgba(255, 188, 168, 0.24), transparent 22%),
        radial-gradient(circle at 74% 78%, rgba(123, 107, 255, 0.26), transparent 28%),
        radial-gradient(circle at 30% 66%, rgba(122, 255, 220, 0.1), transparent 16%),
        linear-gradient(160deg, #0f172b 0%, #0b1324 34%, #070d16 68%, #04060b 100%);
      color: var(--text-primary);
      overflow: hidden;
      user-select: none;
      overscroll-behavior: none;
    }

    button,
    input {
      font: inherit;
    }

    .stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(0px, 4vw, 24px);
    }

    .device {
      position: relative;
      width: min(430px, 100%);
      height: min(932px, 100%);
      max-width: 100%;
      max-height: 100%;
      border-radius: 48px;
      overflow: hidden;
      background: #060910;
      box-shadow:
        0 44px 110px rgba(2, 6, 16, 0.46),
        0 18px 40px rgba(7, 15, 34, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04);
      isolation: isolate;
    }

    @media (max-width: 520px) {
      .stage {
        padding: 0;
      }

      .device {
        width: 100vw;
        height: 100vh;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
      }
    }

    .device::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(122deg, rgba(255, 255, 255, 0.12), transparent 22%, transparent 76%, rgba(255, 255, 255, 0.04)),
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.12), transparent 42%);
      opacity: 0.55;
      pointer-events: none;
      z-index: 1;
    }

    .wallpaper {
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 16% 18%, rgba(125, 214, 255, 0.72), transparent 23%),
        radial-gradient(circle at 84% 12%, rgba(255, 196, 171, 0.4), transparent 21%),
        radial-gradient(circle at 76% 84%, rgba(122, 99, 255, 0.34), transparent 30%),
        radial-gradient(circle at 30% 60%, rgba(124, 255, 221, 0.12), transparent 16%),
        linear-gradient(165deg, #21345c 0%, #152548 26%, #0f1a35 54%, #09111f 100%);
      transform: scale(1.04);
      filter: saturate(112%) contrast(108%);
      z-index: 0;
    }

    .wallpaper::before,
    .wallpaper::after {
      content: "";
      position: absolute;
      inset: -12%;
      pointer-events: none;
    }

    .wallpaper::before {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 22%, rgba(255, 255, 255, 0.06) 48%, transparent 72%);
      mix-blend-mode: screen;
      filter: blur(28px);
      opacity: 0.7;
    }

    .wallpaper::after {
      background:
        radial-gradient(circle at 26% 30%, rgba(255, 255, 255, 0.14), transparent 18%),
        radial-gradient(circle at 74% 40%, rgba(255, 255, 255, 0.08), transparent 16%);
      filter: blur(36px);
      opacity: 0.42;
    }

    .status-shell {
      position: absolute;
      inset: 0 0 auto;
      height: var(--safe-top);
      padding: 14px 18px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      z-index: 40;
      pointer-events: none;
    }

    .status-left {
      padding-left: 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.35);
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-right: 8px;
    }

    .signal {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .signal span {
      width: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.12);
    }

    .signal span:nth-child(1) {
      height: 4px;
      opacity: 0.7;
    }

    .signal span:nth-child(2) {
      height: 6px;
      opacity: 0.78;
    }

    .signal span:nth-child(3) {
      height: 8px;
      opacity: 0.86;
    }

    .signal span:nth-child(4) {
      height: 10px;
    }

    .wifi {
      width: 18px;
      height: 14px;
      color: rgba(255, 255, 255, 0.92);
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.12));
    }

    .wifi path {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
    }

    .wifi circle {
      fill: currentColor;
    }

    .battery {
      --battery-stroke: rgba(255, 255, 255, 0.9);
      --battery-fill-a: rgba(255, 255, 255, 0.94);
      --battery-fill-b: rgba(255, 255, 255, 0.72);
      position: relative;
      display: flex;
      align-items: center;
      width: 27px;
      height: 13px;
      padding: 1.6px;
      border: 1.6px solid var(--battery-stroke);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.04);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 10px rgba(255, 255, 255, 0.06);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .battery::after {
      content: "";
      position: absolute;
      top: 50%;
      right: -3.4px;
      width: 2.4px;
      height: 5px;
      border-radius: 0 2px 2px 0;
      background: var(--battery-stroke);
      transform: translateY(-50%);
      transition: background 0.2s ease;
    }

    .battery-level {
      position: absolute;
      left: 1.6px;
      top: 1.6px;
      bottom: 1.6px;
      width: calc(var(--battery-level, 86) * 1%);
      max-width: calc(100% - 3.2px);
      border-radius: 2.5px;
      background: linear-gradient(90deg, var(--battery-fill-a), var(--battery-fill-b));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 0 10px rgba(255, 255, 255, 0.15);
      transition: width 0.3s var(--curve), background 0.2s ease, box-shadow 0.2s ease;
    }

    .battery-bolt {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      transform: scale(0.82);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }

    .battery-bolt svg {
      width: 9px;
      height: 9px;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.24));
    }

    .battery.charging .battery-bolt {
      opacity: 1;
      transform: scale(1);
    }

    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      width: min(var(--island-width), calc(100% - 130px));
      height: var(--island-height);
      transform: translateX(-50%);
      background: linear-gradient(180deg, rgba(10, 10, 14, 0.99), rgba(1, 1, 3, 0.99));
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 44px;
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      z-index: 50;
      overflow: hidden;
      transition:
        width 0.48s var(--curve),
        height 0.48s var(--curve),
        box-shadow 0.48s var(--curve),
        transform 0.48s var(--curve);
      touch-action: none;
      cursor: pointer;
    }

    .dynamic-island.expanded {
      width: min(392px, calc(100% - 24px));
      height: 182px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.05)),
        rgba(21, 28, 43, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 34px;
      box-shadow:
        0 24px 58px rgba(3, 10, 24, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(26px) saturate(118%);
      -webkit-backdrop-filter: blur(26px) saturate(118%);
    }

    .dynamic-island::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.18), transparent 32%, rgba(255, 255, 255, 0.06) 54%, transparent 72%),
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08), transparent 42%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s var(--curve);
    }

    .dynamic-island.expanded::before {
      opacity: 0.72;
    }

    .island-shell {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 7px 12px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .dynamic-island.expanded .island-shell {
      padding: 12px 16px 16px;
      justify-content: flex-start;
      gap: 12px;
    }

    .island-compact,
    .island-expanded-panel {
      position: relative;
      z-index: 1;
    }

    .island-compact {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 21px;
      transition: opacity 0.25s ease;
    }

    .dynamic-island.expanded .island-compact {
      opacity: 0;
      pointer-events: none;
    }

    .island-expanded-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition:
        opacity 0.3s var(--curve),
        transform 0.3s var(--curve);
    }

    .dynamic-island.expanded .island-expanded-panel {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .island-rest {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .island-rest span {
      display: block;
      width: 58px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.15));
      filter: blur(0.2px);
      animation: restPulse 2.4s ease-in-out infinite;
    }

    .activity-pill,
    .mini-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .activity-pill {
      width: 100%;
      justify-content: space-between;
    }

    .mini-stack {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .mini-pill {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 999px;
      padding: 4px 8px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .activity-orb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.08));
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .activity-orb svg {
      width: 18px;
      height: 18px;
    }

    .activity-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .activity-title {
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .activity-subtitle {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.64);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .activity-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .activity-badge {
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      font-size: 10px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.78);
    }

    .privacy-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      box-shadow: 0 0 10px currentColor;
    }

    .volume-mini {
      width: 40px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    .volume-mini span {
      display: block;
      height: 100%;
      width: calc(var(--volume-level, 50) * 1%);
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.6));
    }

    .island-player-compact {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
    }

    .island-cover,
    .player-cover {
      position: relative;
      overflow: hidden;
      background: var(--artwork);
      background-size: cover;
      background-position: center;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        0 12px 22px rgba(4, 8, 18, 0.22);
    }

    .island-cover::after,
    .player-cover::after,
    .art-tile::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.16), transparent 46%, rgba(8, 14, 28, 0.16)),
        radial-gradient(circle at 26% 18%, rgba(255, 255, 255, 0.22), transparent 26%);
      pointer-events: none;
    }

    .island-cover {
      width: 26px;
      height: 26px;
      border-radius: 9px;
      flex: 0 0 auto;
    }

    .island-player-copy {
      min-width: 0;
      display: grid;
      gap: 1px;
    }

    .island-player-copy strong,
    .island-player-copy span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .island-player-copy strong {
      font-size: 12.5px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .island-player-copy span {
      font-size: 10.5px;
      color: rgba(255, 255, 255, 0.62);
    }

    .island-wave {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
      padding-inline: 2px;
    }

    .island-wave span {
      width: 3px;
      height: 42%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.48));
      transform-origin: center bottom;
      animation: islandWave 1.2s ease-in-out infinite;
      opacity: 0.86;
    }

    .island-wave span:nth-child(2) {
      animation-delay: 0.18s;
      height: 92%;
    }

    .island-wave span:nth-child(3) {
      animation-delay: 0.36s;
      height: 58%;
    }

    .island-wave span:nth-child(4) {
      animation-delay: 0.08s;
      height: 74%;
    }

    .island-wave.paused span {
      animation-play-state: paused;
      opacity: 0.34;
    }

    .expanded-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .expanded-header-copy {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .expanded-header-copy .activity-orb {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
    }

    .expanded-header-copy .activity-orb svg {
      width: 100%;
      height: 100%;
    }

    .expanded-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
    }

    .expanded-subtitle {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.62);
      line-height: 1.35;
    }

    .glass-chip {
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.06);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 4px 12px rgba(4, 8, 18, 0.05);
      cursor: pointer;
    }

    .glass-chip.alt {
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.78);
    }

    .expanded-body {
      display: grid;
      gap: 12px;
    }

    .expanded-meter {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
    }

    .expanded-meter span {
      display: block;
      width: calc(var(--meter, 56) * 1%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.48));
    }

    .expanded-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .expanded-range {
      width: 100%;
      accent-color: #ffffff;
      background: transparent;
    }

    .player-cover {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      flex: 0 0 auto;
    }

    .player-status {
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10.5px;
      color: rgba(255, 255, 255, 0.72);
    }

    .player-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #7cff97;
      box-shadow: 0 0 12px rgba(124, 255, 151, 0.46);
      flex: 0 0 auto;
    }

    .player-progress-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .player-time {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.54);
      font-variant-numeric: tabular-nums;
    }

    .player-controls {
      display: grid;
      grid-template-columns: 42px 56px 42px minmax(92px, 1fr);
      gap: 10px;
      align-items: center;
    }

    .player-control {
      border: 0;
      height: 40px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04)),
        rgba(255, 255, 255, 0.04);
      color: var(--text-primary);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        0 8px 16px rgba(4, 8, 18, 0.08);
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .player-control.primary {
      height: 44px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08)),
        rgba(255, 255, 255, 0.08);
    }

    .player-control.labelled {
      padding: 0 16px;
      justify-items: center;
      font-size: 12px;
      font-weight: 640;
      letter-spacing: -0.01em;
    }

    @media (max-width: 430px) {
      .dynamic-island.expanded {
        width: calc(100% - 28px);
        height: 194px;
      }

      .dynamic-island.expanded .island-shell {
        padding: 12px 14px 15px;
      }

      .player-controls {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .player-control.labelled {
        grid-column: 1 / -1;
      }
    }

    .player-control svg {
      width: 16px;
      height: 16px;
    }

    .scene {
      position: absolute;
      inset: 0;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.45s var(--curve),
        transform 0.55s var(--curve),
        filter 0.45s var(--curve);
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .device[data-view="lock"] #lockScene {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .device[data-view="passcode"] #passcodeScene {
      opacity: 1;
      pointer-events: auto;

    .glass {

      font-size: 22px;
      font-weight: 700;

    .lock-shortcuts {

        rgba(44, 56, 84, 0.14);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.1),

      backdrop-filter: blur(18px) saturate(108%);

    .lock-shortcut::before {

      border-radius: inherit;

    .lock-shortcut svg {

      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.18));

    .unlock-slider {

      height: 56px;
      border-radius: 999px;
      padding: 6px;
      overflow: hidden;
      touch-action: none;

    .unlock-fill {
      position: absolute;
      left: 6px;
      top: 6px;
      bottom: 6px;
      width: calc(44px + var(--unlock-progress, 0) * 1px);

      background: linear-gradient(135deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.12));
      opacity: 0.78;
      transition: width 0.12s linear;
    }

    .unlock-label {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 560;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.68);
      text-shadow: 0 8px 16px rgba(4, 8, 18, 0.2);
      pointer-events: none;
    }

    .unlock-handle {
      position: absolute;
      left: 6px;
      top: 6px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.48), rgba(255, 255, 255, 0.2)),
        rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow:
        0 10px 22px rgba(6, 10, 24, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.46);
      transform: translateX(var(--unlock-progress, 0px));

      will-change: transform;

    .unlock-handle svg {
      width: 20px;
      height: 20px;

    .unlock-slider.dragging .unlock-handle {

        0 12px 24px rgba(0, 0, 0, 0.28),

      flex-direction: column;
      align-items: center;
      padding: 124px 26px 138px;
      background: linear-gradient(180deg, rgba(5, 7, 14, 0.2), rgba(5, 7, 14, 0.5));

    .passcode-copy {
      display: grid;
      gap: 10px;
      justify-items: center;
      text-align: center;

    .passcode-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .passcode-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.72);

      margin: 28px 0 34px;

    .passcode-dot {
      width: 12px;

    }

    .passcode-dot.filled {
      background: rgba(255, 255, 255, 0.96);

      border-color: transparent;
    }

    .passcode-dot.error {
      background: rgba(255, 123, 123, 0.95);
      border-color: transparent;
    }

    .keypad {
      width: min(320px, 100%);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));

      justify-items: center;

      height: 72px;

        0 18px 28px rgba(0, 0, 0, 0.16),

    .passcode-key.small {

    }

    .passcode-key.pressed {

    .home-panels-wrap {

      overflow: hidden;
      touch-action: pan-y;

    .home-panels {

      will-change: transform;
    }

      flex-direction: column;

    .widget-board-secondary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 11px;

    .widget-board-secondary .widget {
      min-height: 188px;
      aspect-ratio: 1 / 1;
    }

    .widget {
      position: relative;
      border-radius: 30px;
      padding: 16px 17px 15px;

      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 14px 28px rgba(5, 10, 24, 0.1);
    }

    .widget::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 52%),

      pointer-events: none;

        radial-gradient(circle at 18% 14%, rgba(104, 198, 255, 0.18), transparent 34%),

    .widget-quote,

    .widget-countdown {

        radial-gradient(circle at 80% 16%, rgba(255, 193, 176, 0.08), transparent 26%),

    }

    .widget-music {
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 192, 147, 0.08), transparent 24%),

    .widget-quote {

        radial-gradient(circle at 20% 20%, rgba(122, 201, 255, 0.06), transparent 22%),

    .quote-text {

    .quote-sub {

      color: rgba(255, 255, 255, 0.68);

    }

    .photo-grid {

      border-radius: 20px;

      position: relative;
    }

    .photo-tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 26% 24%, rgba(255, 255, 255, 0.24), transparent 18%),

    .photo-tile::after {

      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 48%, rgba(8, 14, 28, 0.14));

      align-content: start;

      margin: 0;
      background: transparent;
      color: var(--text-primary);

      gap: 8px;

      transition: transform 0.18s var(--curve-snappy), opacity 0.18s var(--curve);

    .glass-chip.pressed,
    .player-control.pressed,
    .recent-card.pressed,

      width: var(--icon-size);

      overflow: hidden;
      transform: translateZ(0);

      width: var(--icon-size-small);
      height: var(--icon-size-small);

      height: 100%;
      display: block;

    .icon-label {
      max-width: 74px;
      font-size: 11px;
      font-weight: 560;
      letter-spacing: -0.02em;
      line-height: 1.2;

      text-overflow: ellipsis;
      text-shadow: 0 6px 14px rgba(4, 8, 18, 0.22);

      height: var(--dock-height);
      border-radius: 30px;
      padding: 10px 16px 12px;
      display: flex;
      align-items: center;
      z-index: 14;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.04)),
        rgba(76, 93, 132, 0.08);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04),
        0 16px 28px rgba(5, 10, 24, 0.1);

      justify-items: center;

      transition: opacity 0.3s var(--curve), transform 0.36s var(--curve);
      transform: scale(0.9) translateY(12px);

      background: rgba(5, 8, 15, 0.18);

      align-content: start;
      justify-items: center;

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      padding: 8px;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08)),
        rgba(107, 125, 170, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 12px 22px rgba(5, 10, 24, 0.1);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .folder-surface .mini-icon {

      height: 20px;

        linear-gradient(180deg, rgba(9, 13, 24, 0.24), rgba(9, 13, 24, 0.58) 18%, rgba(9, 13, 24, 0.74)),
        radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.08), transparent 18%);

      -webkit-backdrop-filter: blur(28px) saturate(150%);

    .app-header {
      padding: calc(var(--safe-top) + 24px) 22px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .app-header-copy {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-header-copy .icon-wrap {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.2));
    }

    .app-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .app-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.66);
    }

    .app-body {
      padding: 0 18px 150px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .app-section {
      display: grid;
      gap: 14px;
      margin-bottom: 14px;
    }

    .app-card {
      border-radius: 28px;
      padding: 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08)),
        rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        0 18px 38px rgba(0, 0, 0, 0.16);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .card-kicker {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.56);
      margin-bottom: 12px;

    .card-value {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .card-copy {
      font-size: 14px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.72);
      margin-top: 8px;
    }

    .list-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .list-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .list-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.08));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
      flex: 0 0 auto;
    }

    .row-copy {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .row-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.62);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-badge {
      padding: 6px 10px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05)),
        rgba(255, 255, 255, 0.04);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
      flex: 0 0 auto;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .toggle {
      position: relative;
      width: 48px;
      height: 28px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      flex: 0 0 auto;
    }

    .toggle::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.18);
      transform: translateX(var(--toggle-shift, 0px));
    }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .message-list,
    .story-row,
    .product-grid,
    .note-stack,
    .feed-stack {
      display: grid;
      gap: 12px;
    }

    .bubble-thread {
      display: grid;
      gap: 10px;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 20px;
      font-size: 15px;
      line-height: 1.45;
    }

    .bubble.left {
      background: rgba(255, 255, 255, 0.12);
      border-top-left-radius: 8px;
    }

    .bubble.right {
      margin-left: auto;
      background: linear-gradient(135deg, rgba(88, 211, 110, 0.92), rgba(49, 178, 83, 0.9));
      border-top-right-radius: 8px;
    }

    .camera-preview {
      position: relative;
      height: 500px;
      border-radius: 32px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 24%, rgba(255, 255, 255, 0.14), transparent 14%),
        radial-gradient(circle at 76% 38%, rgba(255, 173, 138, 0.18), transparent 24%),
        linear-gradient(145deg, #1a2137, #0a0f18 62%, #05070a);
    }

    .camera-preview::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.08), transparent 32%, transparent 64%, rgba(255, 255, 255, 0.04)),
        radial-gradient(circle at 52% 56%, rgba(157, 207, 255, 0.18), transparent 24%);
    }

    .camera-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 25% 25%;
      opacity: 0.18;
    }

    .camera-focus {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 118px;
      height: 118px;
      transform: translate(-50%, -50%);
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.36);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
    }

    .camera-controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 22px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
    }

    .camera-dot {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .camera-shutter {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 6px solid rgba(255, 255, 255, 0.94);
      box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.18);
    }

    .photo-wall {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .photo-wall span,
    .mini-photo {
      display: block;
      aspect-ratio: 1;
      border-radius: 18px;
      background:
        radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.22), transparent 18%),
        linear-gradient(135deg, var(--tile-a), var(--tile-b));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .photo-wall span:nth-child(1),
    .mini-photo:nth-child(1) {
      --tile-a: #86d4ff;
      --tile-b: #5c63ff;
    }

    .photo-wall span:nth-child(2),
    .mini-photo:nth-child(2) {
      --tile-a: #ffd37b;
      --tile-b: #ff8f55;
    }

    .photo-wall span:nth-child(3),
    .mini-photo:nth-child(3) {
      --tile-a: #78e9c1;
      --tile-b: #2f9b8b;
    }

    .photo-wall span:nth-child(4) {
      --tile-a: #ff9fa4;
      --tile-b: #ff5b7a;
    }

    .photo-wall span:nth-child(5) {
      --tile-a: #ffcf7a;
      --tile-b: #8f79ff;
    }

    .photo-wall span:nth-child(6) {
      --tile-a: #9bc5ff;
      --tile-b: #35a0df;
    }

    .rings {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      padding: 10px 0 4px;
    }

    .ring {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: conic-gradient(var(--ring-color) calc(var(--ring-value) * 1%), rgba(255, 255, 255, 0.08) 0);
      display: grid;
      place-items: center;
    }

    .ring::after {
      content: "";
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(10, 14, 24, 0.8);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .route-map {
      height: 180px;
      border-radius: 24px;
      background:
        linear-gradient(90deg, rgba(125, 216, 253, 0.26) 0 12%, transparent 12% 16%, rgba(107, 255, 188, 0.18) 16% 100%),
        linear-gradient(0deg, rgba(255, 255, 255, 0.06) 0 18%, transparent 18% 34%, rgba(255, 255, 255, 0.04) 34% 48%, transparent 48% 62%, rgba(255, 255, 255, 0.05) 62% 100%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      position: relative;
      overflow: hidden;
    }

    .route-map::before {
      content: "";
      position: absolute;
      left: 16%;
      top: 18%;
      width: 60%;
      height: 58%;
      border: 6px solid #5db5ff;
      border-top-right-radius: 44px;
      border-bottom-left-radius: 48px;
      border-bottom-right-radius: 18px;
      border-top-left-radius: 18px;
      border-right-width: 10px;
      transform: rotate(8deg);
    }

    .route-map::after {
      content: "";
      position: absolute;
      left: 18%;
      top: 24%;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ff715c;
      box-shadow:
        178px 88px 0 #ffd15d,
        180px 88px 0 10px rgba(255, 209, 93, 0.08);
    }

    .book-shelf,
    .note-stack,
    .feed-stack,
    .product-grid {
      display: grid;
      gap: 12px;
    }

    .book-row,
    .product-row,
    .feed-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .book-cover,
    .product-thumb,
    .feed-thumb {
      width: 56px;
      height: 72px;
      border-radius: 16px;
      background:
        radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.22), transparent 18%),
        linear-gradient(135deg, var(--cover-a), var(--cover-b));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .product-thumb,
    .feed-thumb {
      width: 64px;
      height: 64px;
      border-radius: 18px;
    }

    .book-row:nth-child(1) .book-cover {
      --cover-a: #ffb06a;
      --cover-b: #ff6f75;
    }

    .book-row:nth-child(2) .book-cover {
      --cover-a: #84b8ff;
      --cover-b: #6d68ff;
    }

    .book-row:nth-child(3) .book-cover {
      --cover-a: #74e4c0;
      --cover-b: #2d9486;
    }

    .product-row:nth-child(1) .product-thumb,
    .feed-card:nth-child(1) .feed-thumb {
      --cover-a: #ffd27b;
      --cover-b: #ff8c62;
    }

    .product-row:nth-child(2) .product-thumb,
    .feed-card:nth-child(2) .feed-thumb {
      --cover-a: #93c4ff;
      --cover-b: #5d66ff;
    }

    .product-row:nth-child(3) .product-thumb,
    .feed-card:nth-child(3) .feed-thumb {
      --cover-a: #86e5c2;
      --cover-b: #37988b;
    }

    .note-card {
      padding: 14px 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .note-card strong,
    .feed-card strong,
    .product-row strong,
    .book-row strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .note-card p,
    .feed-card p,
    .product-row p,
    .book-row p {
      margin: 0;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.64);
      line-height: 1.45;
    }

    .story-row {
      display: flex;
      gap: 10px;
      overflow: auto;
      padding-bottom: 2px;
    }

    .story-bubble {
      flex: 0 0 auto;
      width: 62px;
      display: grid;
      gap: 8px;
      justify-items: center;
    }

    .story-bubble span {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(135deg, #ffd77a, #ff6d7a, #7865ff);
    }

    .story-bubble span i {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.08));
    }

    .story-bubble small {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.66);
      white-space: nowrap;
    }

    .app-switcher-layer {
      position: absolute;
      inset: 0;
      padding: calc(var(--safe-top) + 84px) 0 150px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .switcher-title {
      padding: 0 18px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.62);
      text-transform: uppercase;
      text-align: center;
    }

    .switcher-cards {
      display: flex;
      gap: 18px;
      overflow-x: auto;
      overflow-y: visible;
      padding: 14px max(18px, calc(50% - 136px)) 22px;
      scroll-snap-type: x mandatory;
      scroll-padding-inline: max(18px, calc(50% - 136px));
      overscroll-behavior-x: contain;
    }

    .switcher-cards.dragging-card {
      scroll-snap-type: none;
    }

    .recent-card {
      position: relative;
      flex: 0 0 272px;
      height: 486px;
      border: 0;
      border-radius: 34px;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08)),
        rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      box-shadow:
        0 26px 42px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      scroll-snap-align: center;
      cursor: grab;
      overflow: hidden;
      user-select: none;
      touch-action: pan-x;
      transition:
        transform 0.28s var(--curve),
        opacity 0.22s ease,
        filter 0.22s ease,
        box-shadow 0.28s var(--curve);
    }

    .recent-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 255, 255, 0.16), transparent 22%),
        linear-gradient(160deg, var(--accent-a), var(--accent-b));
      opacity: 0.28;
    }

    .recent-card > * {
      position: relative;
      z-index: 1;
    }

    .recent-card.is-swiping {
      cursor: grabbing;
      box-shadow:
        0 34px 72px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .recent-card.dismissing {
      pointer-events: none;
    }

    .recent-dismiss-handle {
      width: 46px;
      height: 5px;
      margin: 0 auto 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0.1));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      opacity: 0.88;
    }

    .recent-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .recent-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .recent-meta .icon-wrap {
      width: 34px;
      height: 34px;
      border-radius: 12px;
    }

    .recent-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .recent-preview {
      margin-top: 14px;
      height: 344px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(7, 11, 20, 0.6), rgba(7, 11, 20, 0.8)),
        radial-gradient(circle at 24% 10%, rgba(255, 255, 255, 0.1), transparent 18%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .recent-footer {
      margin-top: 14px;
      display: flex;
      justify-content: center;
    }

    .recent-footer span {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.68);
      letter-spacing: 0.02em;
    }

    .preview-bar {
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .preview-bar.wide {
      width: 86%;
    }

    .preview-bar.mid {
      width: 62%;
    }

    .preview-collage {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .preview-collage span {
      aspect-ratio: 1;
      border-radius: 18px;
      background:
        radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.22), transparent 18%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.04));
    }

    .home-indicator-region {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: min(240px, 60%);
      height: 84px;
      transform: translateX(-50%);
      z-index: 60;
      touch-action: none;
    }

    .home-indicator {
      position: absolute;
      left: 50%;
      bottom: var(--indicator-bottom);
      width: var(--indicator-width);
      height: var(--indicator-height);
      border-radius: 999px;
      transform: translateX(-50%) translateY(calc(var(--indicator-lift, 0px) * -1));
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.74));
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.1);
      opacity: 0.94;
      transition: transform 0.18s var(--curve), opacity 0.18s var(--curve), width 0.18s var(--curve);
    }

    .home-indicator-region.active .home-indicator {
      width: 144px;
      opacity: 1;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: calc(var(--dock-bottom) + var(--dock-height) + 38px);
      transform: translateX(-50%) translateY(10px);
      min-width: 140px;
      max-width: 70%;
      padding: 10px 16px;
      border-radius: 999px;
      text-align: center;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.88);
      background: rgba(8, 12, 20, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s var(--curve), transform 0.25s var(--curve);
      z-index: 70;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hidden {
      display: none;
    }

    @keyframes restPulse {
      0%,
      100% {
        opacity: 0.4;
        transform: scaleX(0.96);
      }
      50% {
        opacity: 0.9;
        transform: scaleX(1.06);
      }
    }

    @keyframes islandWave {
      0%,
      100% {
        transform: scaleY(0.38);
        opacity: 0.5;
      }
      50% {
        transform: scaleY(1);
        opacity: 1;
      }
    }

    @keyframes shake {
      0%,
      100% {
        transform: translateX(0);
      }
      20% {
        transform: translateX(-8px);
      }
      40% {
        transform: translateX(8px);
      }
      60% {
        transform: translateX(-6px);
      }
      80% {
        transform: translateX(6px);
      }
    }

    .shake {
      animation: shake 0.46s var(--curve);
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="device" id="device" data-view="lock">
      <div class="wallpaper"></div>

      const homeIndicator = document.getElementById("homeIndicator");

      const state = {

        homePage: 0,
        currentApp: null,
        recentApps: ["music", "photos", "messages"],

        now: new Date(),
        battery: 86,

      let iconUid = 0;

      const formatTime = (date) => date.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false });
      const formatDate = (date) => date.toLocaleDateString("zh-CN", { month: "long", day: "numeric", weekday: "long" });
      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
      const getCurrentTrack = () => playlist[state.trackIndex] || playlist[0];
      const formatMediaTime = (seconds) => {
        const total = Math.max(0, Math.floor(seconds));
        const minutes = Math.floor(total / 60);
        const remainder = total % 60;
        return `${minutes}:${String(remainder).padStart(2, "0")}`;
      };

      function getAppSubtitle(appId) {
        if (appId === "music") {
          const track = getCurrentTrack();
          return state.musicPlaying ? track.artist : `${track.artist} · 已暂停`;
        }
        return appMeta[appId]?.subtitle || "";
      }

      function applyArtwork() {
        document.documentElement.style.setProperty("--artwork", getCurrentTrack().artwork);
      }

      function renderBattery() {
        const level = clamp(Math.round(state.battery), 0, 100);
        const charging = Boolean(state.charging);
        let stroke = "rgba(255, 255, 255, 0.9)";
        let fillA = "rgba(255, 255, 255, 0.96)";
        let fillB = "rgba(255, 255, 255, 0.72)";
        let glow = "0 0 10px rgba(255, 255, 255, 0.15)";

        if (charging) {
          stroke = "#56d96f";
          fillA = "#8dff8d";
          fillB = "#2fcf5c";
          glow = "0 0 14px rgba(86, 217, 111, 0.32)";
        } else if (level < 20) {
          stroke = "#ff6b6b";
          fillA = "#ff9b8d";
          fillB = "#ff4b57";
          glow = "0 0 14px rgba(255, 92, 92, 0.28)";
        }

        batteryIcon.classList.toggle("charging", charging);
        batteryIcon.classList.toggle("low", !charging && level < 20);
        batteryIcon.style.setProperty("--battery-stroke", stroke);
        batteryIcon.style.setProperty("--battery-fill-a", fillA);
        batteryIcon.style.setProperty("--battery-fill-b", fillB);
        batteryLevel.style.setProperty("--battery-level", level);
        batteryLevel.style.width = `${level}%`;
        batteryLevel.style.boxShadow = `inset 0 1px 0 rgba(255, 255, 255, 0.18), ${glow}`;
        batteryBolt.style.opacity = charging ? "1" : "0";
      }

      function syncBattery(manager) {
        state.battery = clamp(Math.round(manager.level * 100), 0, 100);
        state.charging = Boolean(manager.charging);
        renderBattery();
      }

      function initBattery() {
        renderBattery();
        if (!("getBattery" in navigator)) {
          return;
        }
        navigator.getBattery()
          .then((manager) => {
            batteryManager = manager;
            syncBattery(manager);
            ["levelchange", "chargingchange"].forEach((eventName) => {
              manager.addEventListener(eventName, () => syncBattery(manager));
            });
          })
          .catch(() => {
            batteryManager = null;
            renderBattery();
          });
      }

      function stepTrack(direction) {
        state.trackIndex = (state.trackIndex + direction + playlist.length) % playlist.length;
        state.musicProgress = direction > 0 ? 7 : 19;
        updateMusicWidget();
        renderIsland();
        renderSwitcher();
        if (state.currentApp === "music") {
          renderApp();
        }
        playSound("tap");
      }

      function ensureAudio() {
        if (!state.audioContext) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (AudioCtx) {
            state.audioContext = new AudioCtx();
          }
        }
        if (state.audioContext && state.audioContext.state === "suspended") {
          state.audioContext.resume();
        }
      }

      function playSound(type) {
        ensureAudio();
        if (!state.audioContext) {
          return;
        }

        const ctx = state.audioContext;
        const now = ctx.currentTime;

        const tone = (freq, start, duration, gain, kind = "triangle") => {
          const osc = ctx.createOscillator();
          const amp = ctx.createGain();
          osc.type = kind;
          osc.frequency.setValueAtTime(freq, start);
          amp.gain.setValueAtTime(0.0001, start);
          amp.gain.exponentialRampToValueAtTime(gain, start + 0.01);
          amp.gain.exponentialRampToValueAtTime(0.0001, start + duration);
          osc.connect(amp).connect(ctx.destination);
          osc.start(start);
          osc.stop(start + duration + 0.03);
        };

        if (type === "tap") {
          tone(1460, now, 0.08, 0.02, "triangle");
        } else if (type === "unlock") {
          tone(920, now, 0.09, 0.02, "triangle");
          tone(1380, now + 0.08, 0.12, 0.025, "sine");
        } else if (type === "success") {
          tone(980, now, 0.08, 0.018, "triangle");
          tone(1480, now + 0.07, 0.12, 0.024, "sine");
          tone(1760, now + 0.14, 0.16, 0.018, "sine");
        } else if (type === "error") {
          tone(560, now, 0.12, 0.02, "sawtooth");
          tone(430, now + 0.1, 0.14, 0.018, "sawtooth");
        } else if (type === "switch") {
          tone(1180, now, 0.07, 0.016, "triangle");
          tone(940, now + 0.04, 0.09, 0.014, "triangle");
        } else if (type === "island") {
          tone(1220, now, 0.08, 0.016, "sine");
          tone(1620, now + 0.04, 0.08, 0.012, "triangle");
        }
      }

      function toastMessage(text) {
        toast.textContent = text;
        toast.classList.add("show");
        clearTimeout(state.toastTimer);
        state.toastTimer = setTimeout(() => toast.classList.remove("show"), 1600);
      }

      function setView(view) {
        state.view = view;
        device.dataset.view = view;
      }

      function expandIsland(withSound = false) {
        state.islandExpanded = true;
        dynamicIsland.classList.add("expanded");
        renderIsland();
        if (withSound) {
          playSound("island");
        }
      }

      function collapseIsland(withSound = false) {
        if (!state.islandExpanded) {
          return;
        }
        state.islandExpanded = false;
        dynamicIsland.classList.remove("expanded");
        renderIsland();
        if (withSound) {
          playSound("island");
        }
      }

      function updateTime() {
        state.now = new Date();
        const time = formatTime(state.now);
        const date = formatDate(state.now);
        statusTime.textContent = time;
        lockTime.textContent = time;
        lockDate.textContent = date;
        widgetClockTime.textContent = time;
        widgetClockDate.textContent = date;
        renderBattery();
      }

      function updateMonthWidget() {
        const day = state.now.getDate();

          const active = index === (day % 14);
          return `<span class="${active ? "active" : ""}"></span>`;
        }).join("");
        widgetMonth.innerHTML = cells;

      function renderAppButton(appId, options = {}) {
        const label = options.label === false ? "" : `<span class="icon-label">${appMeta[appId].label}</span>`;
        const attr = options.folder ? `data-folder-app="${appId}"` : `data-app="${appId}"`;
        return `
          <button class="app-icon pressable ${options.className || ""}" type="button" ${attr}>
            <span class="icon-wrap ${options.small ? "small" : ""}">${buildIcon(appId)}</span>
            ${label}
          </button>
        `;
      }

      function renderFolderButton() {
        return `
          <button class="app-icon pressable" type="button" data-folder="records">
            <span class="icon-wrap">${renderFolderIcon()}</span>
            <span class="icon-label">记录夹</span>
          </button>
        `;
      }

      function renderHome() {
        appGridPage0.innerHTML = page0Apps.map((appId) => renderAppButton(appId)).join("");
        appGridPage1.innerHTML = page1Apps.map((appId) => renderAppButton(appId)).join("");
        dockRow.innerHTML = dockApps.map((appId) => renderAppButton(appId, { label: false, small: true })).join("");
        renderPageDots();
      }

      function renderPasscode() {
        passcodeDots.innerHTML = Array.from({ length: 6 }, (_, index) => `<div class="passcode-dot ${index < state.passcode.length ? "filled" : ""}"></div>`).join("");
      }

      function renderPasscodeKeys() {
        const keys = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "", "0", "delete"];
        passcodeKeys.innerHTML = keys.map((key) => {
          if (!key) {
            return `<div class="key-placeholder"></div>`;
          }
          const label = key === "delete" ? "删除" : key;
          return `<button class="passcode-key pressable ${key === "delete" ? "small" : ""}" type="button" data-passcode-key="${key}">${label}</button>`;
        }).join("");
      }

      function verifyPasscode() {
        if (state.passcode === PASSCODE) {
          playSound("success");
          state.passcode = "";
          renderPasscode();
          closeFolder();
          setView("home");
          toastMessage("主屏幕已解锁");
          return;
        }

        playSound("error");
        passcodeCopy.classList.add("shake");
        Array.from(passcodeDots.children).forEach((dot) => dot.classList.add("error"));
        setTimeout(() => {
          state.passcode = "";
          renderPasscode();
          passcodeCopy.classList.remove("shake");
        }, 520);
      }

      function updateUnlockSlider(progress) {
        state.unlockProgress = progress;
        unlockSlider.style.setProperty("--unlock-progress", `${progress}px`);
        unlockFill.style.width = `${46 + progress}px`;
      }

      function showPasscode() {
        updateUnlockSlider(0);
        unlockSlider.classList.remove("dragging");
        playSound("switch");
        setView("passcode");
      }

      function openApp(appId) {
        if (!appMeta[appId]) {
          return;
        }
        touchRecent(appId);
        state.currentApp = appId;
        collapseIsland();
        renderApp();
        renderSwitcher();
        setView("app");
        playSound("switch");
      }

      function goHome() {
        state.currentApp = null;
        collapseIsland();
        closeFolder();
        setView("home");
        playSound("switch");
      }

      function openSwitcher() {
        if (!state.recentApps.length) {
          toastMessage("暂无最近打开项目");
          return;
        }
        collapseIsland();
        renderSwitcher();
        setView("switcher");
        playSound("switch");
      }

      function quickSwitch(direction) {
        if (!state.recentApps.length) {
          toastMessage("暂无可切换应用");
          return;
        }
        let baseIndex = 0;
        if (state.currentApp) {
          const currentIndex = state.recentApps.indexOf(state.currentApp);
          baseIndex = currentIndex === -1 ? 0 : currentIndex;
        }
        const nextIndex = clamp(baseIndex + direction, 0, state.recentApps.length - 1);
        openApp(state.recentApps[nextIndex]);
      }

      function closeRecent(appId) {
        state.recentApps = state.recentApps.filter((entry) => entry !== appId);
        if (state.currentApp === appId) {
          state.currentApp = null;
          if (state.view === "app") {
            setView("home");
          }
        }
        renderSwitcher();
        renderIsland();
      }

      function getActivities() {
        const list = [];
        const track = getCurrentTrack();
        if (state.musicPlaying) {
          list.push({
            id: "music",
            app: "music",
            title: track.title,
            subtitle: state.currentApp === "music" ? `${track.artist} · 播放器保持活跃` : track.artist,
            kind: "music"
          });
        }
        if (Date.now() < state.volumeOverlayUntil) {
          list.push({
            id: "volume",
            app: state.currentApp || "music",
            title: "音量",
            subtitle: `${state.volume}%`,
            kind: "volume"
          });
        }
        if (state.currentApp === "camera") {
          list.push({
            id: "camera",
            app: "camera",
            title: "相机正在使用",
            subtitle: "镜头已激活",
            kind: "privacy-camera",
            color: "#7cff8a"
          });

        const activities = getActivities();

          state.musicPlaying = false;
          updateMusicWidget();
          renderSwitcher();
          if (state.currentApp === "music") {
            renderApp();

          state.volumeOverlayUntil = 0;

        state.islandFocus = 0;
        renderIsland();

                <div class="product-grid">
                  ${[
                    ["磨砂键帽", "手感细腻，适合长时间输入", "收藏"],
                    ["玻璃托盘", "桌面陈列件，透明边缘发亮", "查看"],
                    ["折叠支架", "轻量金属，适合移动使用", "对比"]
                  ].map(([title, copy, badge]) => `
                    <div class="product-row">
                      <div class="product-thumb"></div>
                      <div><strong>${title}</strong><p>${copy}</p></div>
                      <div class="row-badge">${badge}</div>
                    </div>
                  `).join("")}
                </div>
              </div>
            </div>
          `;
        }

        if (appId === "reading") {
          return `
            <div class="app-section">
              <div class="app-card">
                <div class="card-kicker">书架</div>
                <div class="book-shelf">
                  ${[
                    ["玻璃与光线", "关于通透材质在界面中的层次控制。"],
                    ["移动交互", "滑动阻尼、边界回弹与手势优先级。"],
                    ["版式节奏", "如何在紧凑屏幕里保持信息清晰。"]
                  ].map(([title, copy]) => `
                    <div class="book-row">
                      <div class="book-cover"></div>
                      <div><strong>${title}</strong><p>${copy}</p></div>
                      <div class="row-badge">继续</div>
                    </div>
                  `).join("")}
                </div>
              </div>
            </div>
          `;
        }

        if (appId === "diary") {
          return `
            <div class="app-section">
              <div class="app-card">
                <div class="card-kicker">纪念记录</div>
                <div class="note-stack">
                  <div class="note-card"><strong>四月的清单</strong><p>完成主屏幕双页布局，保留底部安全间距与常驻主屏幕指示条。</p></div>
                  <div class="note-card"><strong>本周重点</strong><p>继续打磨灵动岛展开面板，统一内部按钮与音量条反馈。</p></div>
                  <div class="note-card"><strong>后续想法</strong><p>在不依赖外链资源的前提下继续细化应用内的视觉深度。</p></div>
                </div>
              </div>
            </div>
          `;
        }

        return `<div class="app-section"><div class="app-card"><div class="card-value">${appMeta[appId].label}</div></div></div>`;
      }

      function renderApp() {
        if (!state.currentApp || !appMeta[state.currentApp]) {
          return;
        }
        const app = appMeta[state.currentApp];
        appHeaderIcon.innerHTML = buildIcon(state.currentApp);
        appTitle.textContent = app.label;
        appSubtitle.textContent = getAppSubtitle(state.currentApp);
        appBody.innerHTML = appTemplate(state.currentApp);

        const appVolume = document.getElementById("appVolume");
        if (appVolume) {
          appVolume.addEventListener("input", (event) => setVolume(event.target.value));
        }
      }

      function tick() {
        updateTime();
        updateMonthWidget();
        updateCountdown();
        if (state.musicPlaying) {
          state.musicProgress = (state.musicProgress + (100 / getCurrentTrack().duration)) % 100;
          updateMusicWidget();
        }
        renderIsland();
      }

      function handlePasscodeInput(key) {
        if (key === "delete") {
          state.passcode = state.passcode.slice(0, -1);
          renderPasscode();
          playSound("tap");
          return;
        }
        if (state.passcode.length >= 6 || !/^\d$/.test(key)) {
          return;
        }
        state.passcode += key;
        renderPasscode();
        playSound("tap");
        if (state.passcode.length === 6) {
          setTimeout(verifyPasscode, 180);
        }
      }

      function bindPressFeedback() {
        document.addEventListener("pointerdown", (event) => {
          ensureAudio();
          const target = event.target.closest(".pressable");
          if (!target) {
            return;
          }
          target.classList.add("pressed");
          const release = () => {
            target.classList.remove("pressed");
            window.removeEventListener("pointerup", release);
            window.removeEventListener("pointercancel", release);
          };
          window.addEventListener("pointerup", release, { once: true });
          window.addEventListener("pointercancel", release, { once: true });
        });
      }

      function startUnlock(event) {
        if (state.view !== "lock") {
          return;
        }
        const rect = unlockSlider.getBoundingClientRect();
        const max = rect.width - 58;
        unlockGesture = { pointerId: event.pointerId, rect, max };
        unlockSlider.setPointerCapture(event.pointerId);
        unlockSlider.classList.add("dragging");
      }

      unlockSlider.addEventListener("pointerdown", (event) => {
        startUnlock(event);
      });

      unlockSlider.addEventListener("pointermove", (event) => {
        if (!unlockGesture || unlockGesture.pointerId !== event.pointerId) {
          return;
        }
        const next = clamp(event.clientX - unlockGesture.rect.left - 29, 0, unlockGesture.max);
        updateUnlockSlider(next);
      });

      const finishUnlock = (event) => {
        if (!unlockGesture || unlockGesture.pointerId !== event.pointerId) {
          return;
        }
        const completed = state.unlockProgress > unlockGesture.max * 0.78;
        unlockSlider.releasePointerCapture(event.pointerId);
        unlockGesture = null;
        unlockSlider.classList.remove("dragging");
        if (completed) {
          updateUnlockSlider(unlockSlider.clientWidth - 64);
          playSound("unlock");
          setTimeout(showPasscode, 180);
        } else {
          updateUnlockSlider(0);
        }
      };

      unlockSlider.addEventListener("pointerup", finishUnlock);
      unlockSlider.addEventListener("pointercancel", finishUnlock);

      homePanelsWrap.addEventListener("pointerdown", (event) => {
        if (state.view !== "home" || state.folderOpen) {
          return;
        }
        if (event.target.closest("[data-app],[data-folder],[data-folder-app],[data-widget-open],input,button")) {
          return;
        }
        homeSwipe = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startPage: state.homePage
        };
        homePanelsWrap.setPointerCapture(event.pointerId);
      });

      homePanelsWrap.addEventListener("pointermove", (event) => {
        if (!homeSwipe || homeSwipe.pointerId !== event.pointerId) {
          return;
        }
        const deltaX = event.clientX - homeSwipe.startX;
        const atEdge = (homeSwipe.startPage === 0 && deltaX > 0) || (homeSwipe.startPage === 1 && deltaX < 0);
        const damped = atEdge ? deltaX * 0.28 : deltaX;
        snapHome(false, damped);
      });

      const finishHomeSwipe = (event) => {
        if (!homeSwipe || homeSwipe.pointerId !== event.pointerId) {
          return;
        }
        const deltaX = event.clientX - homeSwipe.startX;
        if (Math.abs(deltaX) > homePanelsWrap.clientWidth * 0.16) {
          state.homePage = clamp(homeSwipe.startPage + (deltaX < 0 ? 1 : -1), 0, 1);
        }
        homePanelsWrap.releasePointerCapture(event.pointerId);
        homeSwipe = null;
        snapHome(true);
      };

      homePanelsWrap.addEventListener("pointerup", finishHomeSwipe);
      homePanelsWrap.addEventListener("pointercancel", finishHomeSwipe);

      homeGestureRegion.addEventListener("pointerdown", (event) => {
        if (state.view === "lock" || state.view === "passcode") {
          return;
        }
        indicatorGesture = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          dx: 0,
          dy: 0,
          holdTriggered: false,
          holdTimer: null
        };
        homeGestureRegion.setPointerCapture(event.pointerId);
        homeGestureRegion.classList.add("active");
      });

      homeGestureRegion.addEventListener("pointermove", (event) => {
        if (!indicatorGesture || indicatorGesture.pointerId !== event.pointerId) {
          return;
        }
        indicatorGesture.dx = event.clientX - indicatorGesture.startX;
        indicatorGesture.dy = event.clientY - indicatorGesture.startY;
        const lift = clamp((-indicatorGesture.dy) * 0.16, 0, 14);
        homeIndicator.style.setProperty("--indicator-lift", `${lift}px`);

        if (indicatorGesture.dy < -26 && !indicatorGesture.holdTimer && Math.abs(indicatorGesture.dy) > Math.abs(indicatorGesture.dx)) {
          indicatorGesture.holdTimer = setTimeout(() => {
            if (indicatorGesture && indicatorGesture.dy < -26) {
              indicatorGesture.holdTriggered = true;
              openSwitcher();
            }
          }, 220);
        }
      });

      const finishIndicator = (event) => {
        if (!indicatorGesture || indicatorGesture.pointerId !== event.pointerId) {
          return;
        }
        clearTimeout(indicatorGesture.holdTimer);
        const { dx, dy, holdTriggered } = indicatorGesture;
        if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) + 18) {
          quickSwitch(dx < 0 ? 1 : -1);
        } else if (dy < -92 && !holdTriggered) {
          goHome();
        }
        homeIndicator.style.setProperty("--indicator-lift", "0px");
        homeGestureRegion.classList.remove("active");
        homeGestureRegion.releasePointerCapture(event.pointerId);
        indicatorGesture = null;
      };

      homeGestureRegion.addEventListener("pointerup", finishIndicator);
      homeGestureRegion.addEventListener("pointercancel", finishIndicator);

      dynamicIsland.addEventListener("pointerdown", (event) => {
        if (event.target.closest("input,[data-action]")) {
          return;
        }
        islandGesture = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          longPressed: false,
          longTimer: setTimeout(() => {
            if (islandGesture) {
              expandIsland();
              islandGesture.longPressed = true;
              playSound("island");
            }
          }, 340)
        };
        dynamicIsland.setPointerCapture(event.pointerId);
      });

      dynamicIsland.addEventListener("pointermove", (event) => {
        if (!islandGesture || islandGesture.pointerId !== event.pointerId) {
          return;
        }
        const dx = event.clientX - islandGesture.startX;
        const dy = event.clientY - islandGesture.startY;
        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
          clearTimeout(islandGesture.longTimer);
        }
      });

      const finishIsland = (event) => {
        if (!islandGesture || islandGesture.pointerId !== event.pointerId) {
          return;
        }
        clearTimeout(islandGesture.longTimer);
        const dx = event.clientX - islandGesture.startX;
        const dy = event.clientY - islandGesture.startY;
        const activities = getActivities();
        if (Math.abs(dx) > 90 && !state.islandExpanded) {
          if (dx < 0) {
            dismissFocusedActivity();
          } else if (activities.length > 1) {
            state.islandFocus = (state.islandFocus + 1) % activities.length;
            renderIsland();
          }
          playSound("island");
        } else if (Math.abs(dx) < 10 && Math.abs(dy) < 10 && !islandGesture.longPressed) {
          if (state.islandExpanded) {
            collapseIsland(true);
          } else {
            const focus = activities[state.islandFocus] || activities[0];
            if (focus && state.view === "app") {
              openApp(focus.app);
            } else {
              expandIsland(true);
            }
          }
        }
        dynamicIsland.releasePointerCapture(event.pointerId);
        islandGesture = null;
      };

      dynamicIsland.addEventListener("pointerup", finishIsland);
      dynamicIsland.addEventListener("pointercancel", finishIsland);

      document.addEventListener("pointerdown", (event) => {
        if (!state.islandExpanded) {
          return;
        }
        if (event.target.closest("#dynamicIsland")) {
          return;
        }
        collapseIsland(true);
        event.preventDefault();
        event.stopPropagation();
      }, true);

      function resetRecentCard(card) {
        if (!card) {
          return;
        }
        card.classList.remove("is-swiping", "dismissing");
        card.style.transform = "";
        card.style.opacity = "";
        card.style.filter = "";
      }

      switcherCards.addEventListener("pointerdown", (event) => {
        if (state.view !== "switcher") {
          return;
        }
        const card = event.target.closest("[data-open-recent]");
        if (!card) {
          return;
        }
        switcherSwipe = {
          pointerId: event.pointerId,
          card,
          appId: card.dataset.openRecent,
          startX: event.clientX,
          startY: event.clientY,
          dx: 0,
          dy: 0,
          dragging: false
        };
      });

      switcherCards.addEventListener("pointermove", (event) => {
        if (!switcherSwipe || switcherSwipe.pointerId !== event.pointerId) {
          return;
        }

        switcherSwipe.dx = event.clientX - switcherSwipe.startX;
        switcherSwipe.dy = event.clientY - switcherSwipe.startY;

        if (!switcherSwipe.dragging) {
          if (switcherSwipe.dy < -18 && Math.abs(switcherSwipe.dy) > Math.abs(switcherSwipe.dx) + 10) {
            switcherSwipe.dragging = true;
            switcherSwipe.card.classList.add("is-swiping");
            switcherCards.classList.add("dragging-card");
            switcherSwipe.card.setPointerCapture(event.pointerId);
          } else {
            if (Math.abs(switcherSwipe.dx) > 12 || Math.abs(switcherSwipe.dy) > 12) {
              suppressRecentOpenUntil = performance.now() + 220;
            }
            return;
          }
        }

        const translateY = clamp(switcherSwipe.dy, -220, 0);
        const progress = Math.min(1, Math.abs(translateY) / 140);
        switcherSwipe.card.style.transform = `translate3d(0, ${translateY}px, 0) scale(${1 - progress * 0.08})`;
        switcherSwipe.card.style.opacity = `${1 - progress * 0.92}`;
        switcherSwipe.card.style.filter = `blur(${progress * 8}px)`;
      });

      const finishSwitcherSwipe = (event) => {
        if (!switcherSwipe || switcherSwipe.pointerId !== event.pointerId) {
          return;
        }

        const { card, appId, dx, dy, dragging } = switcherSwipe;
        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
          suppressRecentOpenUntil = performance.now() + 220;
        }

        switcherCards.classList.remove("dragging-card");
        if (dragging) {
          if (card.hasPointerCapture(event.pointerId)) {
            card.releasePointerCapture(event.pointerId);
          }
          if (dy < -110) {
            card.classList.add("dismissing");
            card.style.transform = "translate3d(0, -220px, 0) scale(0.82)";
            card.style.opacity = "0";
            card.style.filter = "blur(10px)";
            setTimeout(() => closeRecent(appId), 140);
            playSound("tap");
          } else {
            resetRecentCard(card);
          }
        }

        switcherSwipe = null;
      };

      switcherCards.addEventListener("pointerup", finishSwitcherSwipe);
      switcherCards.addEventListener("pointercancel", finishSwitcherSwipe);

      document.addEventListener("click", (event) => {
        const passcodeKey = event.target.closest("[data-passcode-key]");
        if (passcodeKey) {
          handlePasscodeInput(passcodeKey.dataset.passcodeKey);
          return;
        }

        const appButton = event.target.closest("[data-app]");
        if (appButton && state.view === "home") {
          openApp(appButton.dataset.app);
          return;
        }

        const folderButton = event.target.closest("[data-folder]");
        if (folderButton && state.view === "home") {
          openFolder();
          playSound("tap");
          return;
        }

        const folderAppButton = event.target.closest("[data-folder-app]");
        if (folderAppButton) {
          closeFolder();
          openApp(folderAppButton.dataset.folderApp);
          return;
        }

        const widgetButton = event.target.closest("[data-widget-open]");
        if (widgetButton && state.view === "home") {
          openApp(widgetButton.dataset.widgetOpen);
          return;
        }

        const action = event.target.closest("[data-action]");
        if (action) {
          const type = action.dataset.action;
          if (type === "prev-track") {
            stepTrack(-1);
            return;
          }
          if (type === "toggle-music") {
            toggleMusic();
            return;
          }
          if (type === "next-track") {
            stepTrack(1);
            return;
          }
          if (type === "collapse-island") {
            collapseIsland(true);
            return;
          }
          if (type === "focus-app") {
            openApp(action.dataset.app);
            return;
          }
        }

        const openRecent = event.target.closest("[data-open-recent]");
        if (openRecent) {
          if (performance.now() < suppressRecentOpenUntil) {
            return;
          }
          openApp(openRecent.dataset.openRecent);
          return;
        }

        if (event.target === folderBackdrop) {
          closeFolder();
          return;
        }

        const shortcut = event.target.closest("[data-shortcut]");
        if (shortcut) {
          if (shortcut.dataset.shortcut === "camera") {
            if (state.view === "lock" || state.view === "passcode") {
              toastMessage("请先完成解锁");
              playSound("tap");
            } else {
              openApp("camera");
            }
          } else {
            toastMessage("手电已准备");
            playSound("tap");
          }
        }
      });

      document.addEventListener("input", (event) => {
        if (event.target === musicVolume) {
          setVolume(event.target.value);
        }
        if (event.target.id === "islandVolumeRange") {
          setVolume(event.target.value);
        }
      });

      document.addEventListener("keydown", (event) => {
        if (state.view === "passcode") {
          if (/^\d$/.test(event.key)) {
            handlePasscodeInput(event.key);
          } else if (event.key === "Backspace") {
            handlePasscodeInput("delete");
          }
        }
        if (event.key === "Escape") {
          if (state.folderOpen) {
            closeFolder();
          } else if (state.view === "app" || state.view === "switcher") {
            goHome();
          } else if (state.islandExpanded) {
            collapseIsland();
          }
        }
      });

      window.addEventListener("resize", () => snapHome(false));

      bindPressFeedback();
      renderHome();
      renderPasscodeKeys();
      renderPasscode();
      initBattery();
      updateTime();
      updateMonthWidget();
      updateCountdown();
      updateMusicWidget();
      renderIsland();
      renderSwitcher();
      snapHome(false);
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
